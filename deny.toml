[advisories]
version = 2
ignore = ["RUSTSEC-2025-0141"]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "ISC",
  "BSD-2-Clause",
  "BSD-2-Clause-Patent",
  "BSD-3-Clause",
  "Zlib",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
allow = []
skip = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
