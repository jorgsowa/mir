name: Benchmarks

# Run on every push to main that touches Rust source (saves a new baseline),
# and on every PR that touches Rust source (compares against the latest main
# baseline and posts a comment).
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

# Keep the fixture version in sync with download-fixtures.sh.
env:
  LARAVEL_FIXTURE_VERSION: v11.44.7

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      pull-requests: write   # needed to post the comparison comment

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Caches registry index, downloaded crates, and compiled artifacts.
      # The bench profile inherits [profile.release] (lto=thin, codegen-units=1)
      # so the first compile is slow; this makes subsequent runs fast.
      - uses: Swatinem/rust-cache@v2

      # Criterion stores benchmark results (JSON baselines) in target/criterion.
      # The rust-cache above may restore stale criterion data from a previous run.
      # Always wipe it so the only baseline present is the one we explicitly restore
      # below (on PRs) or the one we're about to create (on pushes to main).
      - name: Clear stale criterion cache
        run: rm -rf target/criterion

      # critcmp reads Criterion's raw JSON and produces a before/after table.
      # Cache the compiled binary so we don't rebuild it on every run.
      - name: Cache critcmp
        id: critcmp-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/critcmp
          key: critcmp-${{ runner.os }}-v1

      - name: Install critcmp
        if: steps.critcmp-cache.outputs.cache-hit != 'true'
        run: cargo install critcmp

      # Cache the cloned + composer-installed fixture. Key includes the pinned
      # version so a version bump in download-fixtures.sh automatically
      # invalidates the cache.
      - name: Cache Laravel fixture
        id: fixture-cache
        uses: actions/cache@v4
        with:
          path: crates/mir-analyzer/benches/fixtures
          key: laravel-fixture-${{ env.LARAVEL_FIXTURE_VERSION }}

      # PHP + Composer are only needed when the fixture cache is cold.
      - name: Set up PHP
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Download and install benchmark fixture
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: bash crates/mir-analyzer/benches/download-fixtures.sh

      # Reduce measurement noise on the shared runner:
      #   - ASLR off → stable memory-layout addresses across samples
      #   - Performance governor → no frequency scaling mid-measurement
      #   - No turbo boost → eliminates burst-clock outliers
      # These are best-effort; governors and turbo knobs are silently
      # unavailable in most cloud VMs.
      - name: Tune system for stable measurements
        run: |
          echo 0 | sudo tee /proc/sys/kernel/randomize_va_space
          echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null || true
          echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true

      # PRs: restore the most recent main baseline so critcmp can compare.
      - name: Restore main baseline
        if: github.event_name == 'pull_request'
        id: restore-baseline
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          # Exact key won't match (PR SHA ≠ any main SHA); falls through to
          # restore-keys prefix match which picks the most recent main run.
          key: criterion-baseline-main-${{ github.sha }}
          restore-keys: criterion-baseline-main-

      - name: Run benchmarks
        env:
          # 'main' on push, 'pr' on pull_request — used by --save-baseline.
          BASELINE_NAME: ${{ github.event_name == 'pull_request' && 'pr' || 'main' }}
          # Rayon worker threads default to 2 MiB stack; deep PHP AST traversal
          # and recursive type resolution on large corpora (e.g. Laravel) can
          # exceed 8 MiB due to large match-arm locals in analyze_stmt. 16 MiB
          # gives enough headroom without unbounded growth.
          RUST_MIN_STACK: "16777216"
        run: |
          set -eo pipefail
          cargo bench -p mir-analyzer --bench analyze_real_world \
            -- --save-baseline "$BASELINE_NAME" --noplot 2>&1 | tee bench-output.txt
          # Save memory stats alongside the Criterion baseline so PRs can diff them.
          grep '\[memory\]' bench-output.txt | sed 's/^[[:space:]]*//' \
            > "target/criterion/memory-${BASELINE_NAME}.txt" || true
          echo '## Benchmark output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Push to main: persist the new baseline for future PR comparisons.
      - name: Save main baseline
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-baseline-main-${{ github.sha }}

      # PRs: compare and post. Skip gracefully if no baseline was restored
      # (first benchmark run ever, or cache was evicted).
      - name: Compare baselines
        if: >-
          github.event_name == 'pull_request' &&
          steps.restore-baseline.outputs.cache-matched-key != ''
        run: |
          critcmp main pr | tee critcmp-output.txt
          echo '## Benchmark results (PR vs `main`)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat critcmp-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '## Memory (PR vs `main`)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo 'main:' >> "$GITHUB_STEP_SUMMARY"
          cat target/criterion/memory-main.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null \
            || echo '(unavailable)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'PR:' >> "$GITHUB_STEP_SUMMARY"
          cat target/criterion/memory-pr.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null \
            || echo '(unavailable)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post no-baseline notice
        if: >-
          github.event_name == 'pull_request' &&
          steps.restore-baseline.outputs.cache-matched-key == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark results\n\nNo `main` baseline found — comparison skipped. A baseline will be saved when this PR merges.',
            });

      - name: Post comparison comment
        if: >-
          github.event_name == 'pull_request' &&
          steps.restore-baseline.outputs.cache-matched-key != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const table = fs.readFileSync('critcmp-output.txt', 'utf8');

            function parseMemory(path) {
              if (!fs.existsSync(path)) return {};
              const re = /\[memory\]\s+(.+?):\s+peak live ([\d.]+) MiB,\s+total allocated ([\d.]+) MiB/g;
              const out = {};
              let m;
              const text = fs.readFileSync(path, 'utf8');
              while ((m = re.exec(text)) !== null)
                out[m[1].trim()] = { peak: parseFloat(m[2]), total: parseFloat(m[3]) };
              return out;
            }

            function buildMemoryTable(mainS, prS) {
              const keys = [...new Set([...Object.keys(mainS), ...Object.keys(prS)])].sort();
              if (!keys.length) return null;
              const rows = keys.map(k => {
                const m = mainS[k], p = prS[k];
                const mp = m ? `${m.peak.toFixed(1)} MiB` : 'N/A';
                const pp = p ? `${p.peak.toFixed(1)} MiB` : 'N/A';
                const mt = m ? `${m.total.toFixed(1)} MiB` : 'N/A';
                const pt = p ? `${p.total.toFixed(1)} MiB` : 'N/A';
                let delta = 'N/A';
                if (m && p) {
                  const d = p.peak - m.peak;
                  const pct = m.peak ? d / m.peak * 100 : 0;
                  const s = d >= 0 ? '+' : '';
                  delta = `${s}${d.toFixed(1)} MiB (${s}${pct.toFixed(1)}%)`;
                }
                return { k, mp, pp, delta, mt, pt };
              });
              const pad = (s, n, r = false) => r ? String(s).padStart(n) : String(s).padEnd(n);
              const cols = {
                k:  Math.max(...rows.map(r => r.k.length),  'benchmark'.length),
                mp: Math.max(...rows.map(r => r.mp.length), 'peak(main)'.length),
                pp: Math.max(...rows.map(r => r.pp.length), 'peak(pr)'.length),
                d:  Math.max(...rows.map(r => r.delta.length), 'Δ peak'.length),
                mt: Math.max(...rows.map(r => r.mt.length), 'total(main)'.length),
                pt: Math.max(...rows.map(r => r.pt.length), 'total(pr)'.length),
              };
              const fmt = r =>
                `${pad(r.k,cols.k)}  ${pad(r.mp,cols.mp,true)}  ${pad(r.pp,cols.pp,true)}  ${pad(r.delta,cols.d,true)}  ${pad(r.mt,cols.mt,true)}  ${pad(r.pt,cols.pt,true)}`;
              const hdr = fmt({k:'benchmark', mp:'peak(main)', pp:'peak(pr)', delta:'Δ peak', mt:'total(main)', pt:'total(pr)'});
              return [hdr, '-'.repeat(hdr.length), ...rows.map(fmt)].join('\n');
            }

            const memTable = buildMemoryTable(
              parseMemory('target/criterion/memory-main.txt'),
              parseMemory('target/criterion/memory-pr.txt'),
            );

            let body = `## Benchmark results (PR vs \`main\`)\n\`\`\`\n${table}\`\`\`\n`;
            if (memTable) {
              body += `\n## Memory (PR vs \`main\`)\n\`\`\`\n${memTable}\n\`\`\`\n`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
